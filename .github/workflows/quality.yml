# Quality gate for pushes and PRs. Make these checks required in branch protection.
# Hard gate: ruff (lint) + mypy (types) + the unit tests. Still ratcheted off
# (see .engineering-standard/review-2026-07-19.md): ruff format, bandit, isort, strict mypy.
name: quality

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: python quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      # personal/ is gitignored; scaffold the config the engine imports so the
      # tests can load pipeline_store. (Mirrors what setup.py does for a new user.)
      - name: Scaffold config (tests import it)
        run: |
          mkdir -p personal/data
          cp starter/userconfig.template.py personal/userconfig.py
          echo '{"jobs": []}' > personal/data/jobs.json

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Tests
        run: python -m unittest discover -s tests

      - name: Type check (mypy)
        run: mypy engine

      # Dependency CVE audit. Gates on any KNOWN vulnerability in the resolved
      # tree, so a new advisory turns CI red loudly rather than sitting unnoticed.
      #
      # Justified ignore (same discipline as the bandit S-rule exceptions in
      # pyproject.toml — an exception tied to the threat model, not a silenced
      # warning):
      #   PYSEC-2026-1604 — markdownify <0.14.1 memory-consumption DoS via
      #   oversized <h9999999> headlines. The fix (0.14.1) is BLOCKED upstream:
      #   python-jobspy 1.1.82 pins markdownify<0.14.0, so we cannot bump it
      #   without breaking jobspy. Blast radius is low — a local, single-user
      #   tool would have to scrape a maliciously-crafted job posting to trigger
      #   extra memory use in one run. Revisit when python-jobspy relaxes its
      #   <0.14 upper pin, then drop this ignore and let the bump flow through.
      - name: Dependency audit (pip-audit)
        run: pip-audit --ignore-vuln PYSEC-2026-1604

  # Push CI failures to a channel (autonomous insight). Channel-configurable via
  # the NOTIFY_KIND variable — Slack (Block Kit) default, Teams (MessageCard), or
  # generic webhook. No-ops when the URL secret is unset. Setup + payload detail:
  # ai-standards/references/ci-notifications.md. Kept identical across the fleet
  # on purpose (each repo stands alone); that file is its single source of truth.
  notify:
    needs: python
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify on failure
        env:
          KIND: ${{ vars.NOTIFY_KIND || 'slack' }}
          SLACK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TEAMS_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
          MENTION: ${{ vars.NOTIFY_SLACK_MENTION }}
        run: |
          case "$KIND" in
            slack) URL="$SLACK_URL" ;;
            teams) URL="$TEAMS_URL" ;;
            *)     URL="$WEBHOOK_URL" ;;
          esac
          if [ -z "$URL" ]; then
            echo "No webhook URL for NOTIFY_KIND=$KIND — skipping."
            exit 0
          fi
          SHA="${GITHUB_SHA:0:8}"
          RUN="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          FALLBACK="CI failed: $GITHUB_REPOSITORY @ $SHA on $GITHUB_REF_NAME - $RUN"
          # Optional Slack mention so a failure actively notifies, not just
          # posts. Slack-only syntax; ignored for teams/webhook. Set the
          # NOTIFY_SLACK_MENTION repo variable to: channel | here | <@U…> | <!subteam^…>.
          case "$MENTION" in
            channel) MENTION="<!channel>" ;;
            here)    MENTION="<!here>" ;;
            *)       : ;;  # empty stays empty; raw tokens pass through
          esac
          # jq (preinstalled on runners) builds every payload — no shell text is
          # interpolated into JSON, so a hostile branch name cannot break it.
          case "$KIND" in
            slack)
              BODY=$(jq -nc --arg repo "$GITHUB_REPOSITORY" --arg sha "$SHA" --arg branch "$GITHUB_REF_NAME" --arg run "$RUN" --arg fb "$FALLBACK" --arg mention "$MENTION" '($mention | if . == "" then "" else . + " " end) as $m | { text: ($m + $fb), blocks: [ { type:"section", text:{ type:"mrkdwn", text:($m + ":x: *CI failed* — `" + $repo + "`") } }, { type:"section", fields:[ { type:"mrkdwn", text:("*Branch:* " + $branch) }, { type:"mrkdwn", text:("*Commit:* `" + $sha + "`") } ] }, { type:"actions", elements:[ { type:"button", text:{ type:"plain_text", text:"View run" }, url:$run, style:"danger" } ] } ] }') ;;
            teams)
              BODY=$(jq -nc --arg t "$FALLBACK" '{"@type":"MessageCard","@context":"http://schema.org/extensions","summary":"CI failure","themeColor":"D64545","text":$t}') ;;
            *)
              BODY=$(jq -nc --arg t "$FALLBACK" '{text:$t}') ;;
          esac
          curl -fsS -X POST -H 'content-type: application/json' -d "$BODY" "$URL" || echo "notify POST failed (non-fatal) — CI status already shows the failure"
