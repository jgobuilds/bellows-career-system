# Quality gate for pushes and PRs. Make these checks required in branch protection.
# Hard gate: ruff (lint) + mypy (types) + the unit tests. Still ratcheted off
# (see .engineering-standard/review-2026-07-19.md): ruff format, bandit, isort, strict mypy.
name: quality

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: python quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      # personal/ is gitignored; scaffold the config the engine imports so the
      # tests can load pipeline_store. (Mirrors what setup.py does for a new user.)
      - name: Scaffold config (tests import it)
        run: |
          mkdir -p personal/data
          cp starter/userconfig.template.py personal/userconfig.py
          echo '{"jobs": []}' > personal/data/jobs.json

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Tests
        run: python -m unittest discover -s tests

      - name: Type check (mypy)
        run: mypy engine
