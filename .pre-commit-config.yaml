# Local quality gate — runs before every commit so problems never reach CI.
# Install once per clone (pre-COMMIT stage only):  pre-commit install
#
# Do NOT run `pre-commit install --hook-type pre-push`. Wrapping the CI gate in the
# pre-commit framework ran the commit-stage hooks (trailing-whitespace, etc.) at
# push time and HUNG on Windows (2026-07-22). The pre-push gate is a plain script
# instead — .git/hooks/pre-push runs `python tools/ci_local.py` directly (~15s),
# which reproduces CI's scaffolded-template environment. Recreate it on a fresh
# clone with:  printf '#!/bin/sh\\nexec python tools/ci_local.py\\n' > .git/hooks/pre-push
# (see CONTRIBUTING.md). It catches config-dependent tests that pass locally but
# fail in CI — the failure mode that shipped twice.
minimum_pre_commit_version: "3.5.0"
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: detect-private-key        # stop committed secrets early
      - id: check-yaml
      - id: check-toml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff                       # lint against pyproject.toml's [tool.ruff]
        args: [--fix]
      - id: ruff-format                # format (black-compatible)

# The CI gate (tools/ci_local.py) is intentionally NOT a pre-commit hook here — see
# the header. It runs as a plain .git/hooks/pre-push script to avoid the framework
# hang on Windows.
